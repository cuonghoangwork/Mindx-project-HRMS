<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light">
    <div class="forgot-screen">
      <div class="forgot-visual" aria-hidden="true"></div>

      <div class="forgot-details">
        <div class="forgot-back">
          <button
            class="forgot-back-btn"
            id="forgot-back-btn"
            type="button"
            aria-label="Back"
          >
            <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="#16151C"
                d="M10 19l-7-7 7-7 1.41 1.41L6.83 11H22v2H6.83l4.58 4.59z"
              />
            </svg>
          </button>
          <span>Back</span>
        </div>

        <div class="forgot-head">
          <h2>Welcome back, Fabiana</h2>
          <p>Reset your password by entering your email below.</p>
        </div>

        <form class="forgot-form" id="forgot-form">
          <label class="forgot-input">
            <span class="forgot-label">Email Address</span>
            <input
              type="email"
              name="email"
              autocomplete="email"
              placeholder="Enter your email"
              value="fabiana.rivera@hrms.com"
              required
            />
          </label>

          <button class="forgot-submit" type="submit">Send reset link</button>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      // Minimal demo behavior; replace with your auth logic/API later.
      const forgotForm = document.getElementById("forgot-form");
      if (forgotForm) {
        forgotForm.addEventListener("submit", (e) => {
          e.preventDefault();
          alert("Request received. (Demo)");
        });
      }
    </script>
    <script src="store.js"></script>
  </body>
</html>
